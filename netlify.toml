# ── Netlify · DAS Control de Gestión Sanitaria (Pozo Almonte) ───────────
# Despliegue HÍBRIDO: sitio estático (prototype/) + backend Supabase.
# La conexión a Supabase (URL + clave pública) ya va dentro de index.html.
#
# IMPORTANTE: base="prototype" hace que Netlify SOLO mire esa carpeta.
# Así NO detecta el Next.js de apps/web y publica el sitio estático tal cual.

[build]
  base = "prototype"   # Netlify entra a esta carpeta (sin frameworks → sin build)
  publish = "."        # publica el contenido de prototype/ (index.html + assets)
  command = ""         # sin compilación

# Cualquier ruta sirve la app (es una sola página).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cabeceras de seguridad básicas.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
